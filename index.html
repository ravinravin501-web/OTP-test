<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DMK Login</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:
linear-gradient(
135deg,
#000,
#4b0000,
#c40000
);

display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

/* LOGIN BOX */

.login-box{
width:100%;
max-width:390px;
background:#111;
border:3px solid #ffcc00;
border-radius:28px;
padding:35px 25px;
text-align:center;
box-shadow:0 0 30px rgba(255,0,0,.6);
}

/* TITLE */

h1{
color:#ffcc00;
font-size:30px;
margin-bottom:8px;
}

.sub{
color:#ddd;
margin-bottom:25px;
font-size:15px;
}

/* INPUT */

input{
width:100%;
padding:15px;
margin:12px 0;
border-radius:14px;
border:2px solid red;
font-size:16px;
outline:none;
}

/* BUTTON */

button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:14px;
background:red;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffcc00;
color:black;
}

/* MESSAGE */

#msg{
margin-top:18px;
font-weight:bold;
color:#ffcc00;
line-height:1.5;
}

/* FOOTER */

.footer{
margin-top:25px;
font-size:13px;
color:#aaa;
}

</style>
</head>

<body>

<div class="login-box">

<h1>DMK Login</h1>

<p class="sub">
Real SMS OTP Login
</p>

<input
type="text"
id="phone"
placeholder="1234567890">

<div id="recaptcha-container"></div>

<button onclick="sendOTP()">
Send OTP
</button>

<input
type="text"
id="otp"
placeholder="Enter OTP">

<button onclick="verifyOTP()">
Verify & Login
</button>

<div id="msg"></div>

<div class="footer">
Created by Ravin Tech Solution
</div>

</div>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyAJqxiemmwfjZ__hcyFjcNyI9h8jSaBPA",

authDomain: "otp-login-e7f30.firebaseapp.com",

projectId: "otp-login-e7f30",

storageBucket: "otp-login-e7f30.appspot.com",

messagingSenderId: "280218111444",

appId: "1:280218111444:web:7b6204486853d6f3f91a41"

};

/* INITIALIZE FIREBASE */

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

/* RECAPTCHA */

window.onload = function(){

window.recaptchaVerifier =
new firebase.auth.RecaptchaVerifier(
"recaptcha-container",
{
size:"normal",

callback:function(response){

document.getElementById("msg").innerHTML =
"✅ reCAPTCHA Verified";

}
});

window.recaptchaVerifier.render();

};

/* SEND OTP */

function sendOTP(){

let phone =
document.getElementById("phone").value.trim();

/* AUTO ADD INDIA CODE */

if(!phone.startsWith("+91")){

phone = "+91" + phone;

}

if(phone.length < 13){

document.getElementById("msg").innerHTML =
"❌ Enter valid mobile number";

return;

}

auth.signInWithPhoneNumber(
phone,
window.recaptchaVerifier
)

.then(function(confirmationResult){

window.confirmationResult =
confirmationResult;

document.getElementById("msg").innerHTML =
"✅ Real OTP SMS sent successfully";

})

.catch(function(error){

document.getElementById("msg").innerHTML =
"❌ " + error.message;

});

}

/* VERIFY OTP */

function verifyOTP(){

let otp =
document.getElementById("otp").value.trim();

if(otp === ""){

document.getElementById("msg").innerHTML =
"❌ Enter OTP";

return;

}

if(!window.confirmationResult){

document.getElementById("msg").innerHTML =
"❌ First click Send OTP";

return;

}

window.confirmationResult.confirm(otp)

.then(function(result){

let user = result.user;

localStorage.setItem(
"isLoggedIn",
"true"
);

localStorage.setItem(
"gmail",
user.phoneNumber
);

document.getElementById("msg").innerHTML =
"✅ Login Successful";

setTimeout(()=>{

window.location.href =
"dashboard.html";

},1000);

})

.catch(function(error){

document.getElementById("msg").innerHTML =
"❌ Wrong OTP";

});

}

</script>

</body>
</html>
